    - name: Install Buildozer
      run: |
        pip3 install --upgrade pip
        pip3 install buildozer cython==0.29.19
        
    - name: Build APK
      run: |
        buildozer -v android debug 2>&1 | tee buildozer_build.log
        
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v3
      with:
        name: pk10-helper-apk
        path: bin/*.apk
        retention-days: 30
        
    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: buildozer-build-log
        path: buildozer_build.log
        retention-days: 7
